name: Generate hash registry

on:
  schedule:
    - cron: "0 12 * * *" # daily at 12:00 UTC, after the .NET client generation run
  workflow_dispatch: {}
  push:
    paths:
      - "scripts/generate_hash_registry.py"

permissions:
  contents: write

concurrency:
  group: generate-hash-registry
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history: the script pins each hash file to the commit that last touched its ARC-56 spec

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate approval-programs/ and clear-programs/
        run: python scripts/generate_hash_registry.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- approval-programs clear-programs && [ -z "$(git status --porcelain -- approval-programs clear-programs)" ]; then
            echo "No changes to approval-programs/ or clear-programs/"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add approval-programs clear-programs
          git commit -m "chore: update program hash registry"
          git push
