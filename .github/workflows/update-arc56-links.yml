name: Update ARC-56 links

on:
  schedule:
    - cron: "0 3 * * *" # daily at 03:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-arc56-links
  cancel-in-progress: false

jobs:
  update-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update arc56.links.csv (commits and pushes incrementally as links are found)
        env:
          GH_SEARCH_TOKEN: ${{ secrets.GH_SEARCH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_arc56_links.py
