name: Update ARC-56 links

on:
  schedule:
    - cron: "0 3 * * *" # daily at 03:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-arc56-links
  cancel-in-progress: false

jobs:
  update-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate arc56.links.csv
        env:
          GH_SEARCH_TOKEN: ${{ secrets.GH_SEARCH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_arc56_links.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- arc56.links.csv; then
            echo "No changes to arc56.links.csv"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add arc56.links.csv
          git commit -m "chore: update arc56.links.csv"
          git push
