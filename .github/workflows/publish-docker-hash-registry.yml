name: Publish Docker Hub hash registry image

# Packages approval-programs/, clear-programs/, abi-signatures/, arc56.links.csv, and
# a landing page as an unprivileged nginx webserver image (scholtz2/arc56-registry)
# and pushes it to Docker Hub, tagged with today's UTC date (YYYY-MM-DD) and `latest`.
# This lets a wallet run its own local mirror of the registry, served over plain HTTP,
# instead of depending on scholtz.github.io/ARC56Registry being reachable at call
# time. See docs/docker-hash-registry.md and docs/dockerhub-publishing-setup.md for
# the one-time DOCKERHUB_USERNAME/DOCKERHUB_TOKEN secret setup this needs.

on:
  workflow_run:
    # Rebuilds after either source changes: the hash/ABI tables (Generate hash
    # registry) or the raw link list (Update ARC-56 links) - both are now bundled
    # into this image, and automated-commit pushes from those workflows don't trigger
    # this workflow's own `push` filter below (GITHUB_TOKEN-authored commits don't
    # fire other workflows' push triggers), so workflow_run is the only way to chain
    # off them.
    workflows: ["Generate hash registry", "Update ARC-56 links"]
    types: [completed]
  workflow_dispatch: {}
  push:
    paths:
      - "docker/hash-registry/**"

permissions:
  contents: read

concurrency:
  group: publish-docker-hash-registry
  cancel-in-progress: false

jobs:
  publish:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      # `secrets` can't be referenced directly in a step's `if:` - route it through a
      # job-level env var instead.
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute date tag
        id: tag
        run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build once, locally, and boot it before pushing anything - catches a broken
      # Dockerfile/nginx config regardless of whether Docker Hub credentials are
      # configured yet, instead of only finding out on the next real pull.
      - name: Build image for smoke test
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/hash-registry/Dockerfile
          load: true
          tags: arc56-registry:smoke-test

      - name: Smoke test image
        run: |
          set -e
          docker run -d --name arc56-registry-smoke -p 18080:8080 arc56-registry:smoke-test
          for i in $(seq 1 20); do
            if curl -fsS http://localhost:18080/README.md >/dev/null; then break; fi
            sleep 0.5
          done
          curl -fsS http://localhost:18080/README.md >/dev/null
          curl -fsS http://localhost:18080/ >/dev/null
          docker rm -f arc56-registry-smoke

      - name: Log in to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/hash-registry/Dockerfile
          push: true
          tags: |
            scholtz2/arc56-registry:${{ steps.tag.outputs.date }}
            scholtz2/arc56-registry:latest

      # Keeps the Docker Hub repo page's "Overview" tab in sync with
      # docker/hash-registry/README.md - otherwise it permanently shows "No overview
      # available" since `docker push` never uploads a README, only image layers.
      # Needs the same DOCKERHUB_TOKEN, but unlike the push step above, this API call
      # specifically needs a token with "Read, Write, Delete" scope - "Read & Write"
      # (enough for `docker push`) 403s here. See docs/dockerhub-publishing-setup.md.
      - name: Sync Docker Hub repository description
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: scholtz2/arc56-registry
          short-description: "Self-hosted ARC-56 program hash + ABI signature registry (unprivileged nginx, port 8080)."
          readme-filepath: docker/hash-registry/README.md

      - name: Skip publish (Docker Hub credentials not configured yet)
        if: ${{ env.DOCKERHUB_USERNAME == '' || env.DOCKERHUB_TOKEN == '' }}
        run: |
          echo "DOCKERHUB_USERNAME/DOCKERHUB_TOKEN repo secrets not set - see docs/dockerhub-publishing-setup.md. Skipping publish."
