name: Download ARC-56 specs

# First stage of both the .NET and TypeScript client pipelines (download -> generate ->
# publish, x2). Downloads every active ARC-56 spec in arc56.links.csv into
# clients/<owner>/<repo>/arc56/ - shared across every ecosystem's generated client for
# that repo, so it only has to happen once no matter how many client languages are
# generated from it. See docs/dotnet-client-pipeline.md and
# docs/typescript-client-pipeline.md.

on:
  schedule:
    - cron: "0 4 * * *" # daily at 04:00 UTC, after the ARC-56 links update (03:00 UTC)
  workflow_dispatch:
    inputs:
      only_repo:
        description: "Optional: only process owner/repo, exact match (can be a comma-separated list)"
        required: false
        type: string
      filter:
        description: "Optional: only process owner/repo pairs containing this keyword, case-insensitive
          (e.g. 'scholtz' or 'scholtz/Biatec'; can be a comma-separated list of keywords, OR'd together)"
        required: false
        type: string
      retry_failed:
        description: "Retry URLs that previously failed to download, instead of skipping them"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: download-arc56-specs
  cancel-in-progress: false

jobs:
  download:
    runs-on: ubuntu-latest
    # A full run downloads every active ARC-56 URL, at least 7s apart; with thousands
    # of URLs this can take hours. See docs/dotnet-client-pipeline.md.
    timeout-minutes: 350
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download ARC-56 specs (commits each project as it's ready)
        run: |
          ARGS=()
          if [ -n "${{ inputs.only_repo }}" ]; then
            IFS=',' read -ra REPOS <<< "${{ inputs.only_repo }}"
            for r in "${REPOS[@]}"; do
              ARGS+=(--only-repo "$r")
            done
          fi
          if [ -n "${{ inputs.filter }}" ]; then
            IFS=',' read -ra KEYWORDS <<< "${{ inputs.filter }}"
            for k in "${KEYWORDS[@]}"; do
              ARGS+=(--filter "$k")
            done
          fi
          if [ "${{ inputs.retry_failed }}" = "true" ]; then
            ARGS+=(--retry-failed)
          fi
          python scripts/download_arc56_specs.py --commit "${ARGS[@]}"

      - name: Commit any remaining changes and push
        if: always()
        run: |
          CLIENT_PATHS=(clients/*/*/arc56)
          if ! git diff --quiet -- "${CLIENT_PATHS[@]}" || ! git diff --quiet --cached -- "${CLIENT_PATHS[@]}"; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add "${CLIENT_PATHS[@]}"
            git commit -m "chore: download ARC-56 specs"
          fi
          git push
