name: Generate .NET ARC-56 clients

on:
  schedule:
    - cron: "0 5 * * *" # daily at 05:00 UTC, after the ARC-56 links update (03:00 UTC)
  workflow_dispatch:
    inputs:
      only_repo:
        description: "Optional: only process owner/repo (can be a comma-separated list), for testing"
        required: false
        type: string
  push:
    paths:
      - "clients/_template/**"

permissions:
  contents: write
  id-token: write # required for NuGet.org Trusted Publishing (OIDC token exchange)

concurrency:
  group: generate-dotnet-clients
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    # A full run downloads and generates a client for every active ARC-56 URL, at least
    # 7s apart per download; with thousands of URLs this can take many hours. See
    # docs/dotnet-client-pipeline.md for why, and how incremental runs stay fast.
    timeout-minutes: 350
    env:
      # `secrets` can't be referenced directly in a step's `if:` - route it through a
      # job-level env var instead (see "Invalid workflow file" / "Unrecognized
      # named-value: 'secrets'" if this is inlined into the if: below).
      NUGET_USER: ${{ secrets.NUGET_USER }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # Trusted Publishing (OIDC -> short-lived nuget.org API key), obtained once up
      # front and handed to the generator script below, which pushes each project's
      # package the moment that project is packed rather than batching every push
      # until the whole (potentially hours-long) run finishes - see
      # docs/dotnet-client-pipeline.md. Skipped if NUGET_USER isn't configured yet
      # (e.g. before the one-time nuget.org policy setup), in which case the script
      # still generates/packs everything but leaves --publish's pushes to retry on a
      # later run once the secret exists.
      - name: NuGet login (OIDC -> short-lived API key)
        if: ${{ env.NUGET_USER != '' }}
        uses: NuGet/login@v1
        id: nuget_login
        with:
          user: ${{ env.NUGET_USER }}

      # Commits each project as soon as it's processed (see commit_project_changes() /
      # --commit in the script) rather than one giant commit at the end - so "Push"
      # below always has something to push even when the working tree looks clean.
      - name: Generate/update .NET clients (packs + publishes + commits each project as it's ready)
        id: generate
        env:
          NUGET_API_KEY: ${{ steps.nuget_login.outputs.NUGET_API_KEY }}
        run: |
          ARGS=()
          if [ -n "${{ inputs.only_repo }}" ]; then
            IFS=',' read -ra REPOS <<< "${{ inputs.only_repo }}"
            for r in "${REPOS[@]}"; do
              ARGS+=(--only-repo "$r")
            done
          fi
          python scripts/generate_dotnet_clients.py --publish --commit "${ARGS[@]}"

      # `if: always()` on this and the next step matters: the generate step above pushes
      # its own commits periodically as it goes (see push_commits() in the script) and
      # can still exit nonzero for an unexpected per-project failure (script still
      # processes/commits/pushes every other project first - see main()'s try/except).
      # Without always(), that nonzero exit would skip both steps below and strand
      # whatever was packed/committed-but-not-yet-pushed since the last periodic push.
      - name: Upload packed NuGet packages
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          path: artifacts/nupkgs/*.nupkg
          if-no-files-found: ignore

      - name: Commit any remaining changes and push
        if: always()
        run: |
          # Mirrors what commit_project_changes() in the script stages per-project
          # (the whole clients/<owner>/<repo>/ dir, i.e. both dotnet/ and arc56/), plus
          # the shared _template/_incidents dirs.
          CLIENT_PATHS=(clients/*/*/dotnet clients/*/*/arc56 clients/_template clients/_incidents)
          if ! git diff --quiet -- "${CLIENT_PATHS[@]}" || ! git diff --quiet --cached -- "${CLIENT_PATHS[@]}"; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add "${CLIENT_PATHS[@]}"
            git commit -m "chore: regenerate .NET ARC-56 clients"
          fi
          # Always push - the generate step above already made most commits one per
          # project as it went; this just picks up anything that slipped through
          # (e.g. --commit wasn't passed) and pushes whatever's ahead of the remote.
          git push
