[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arc56-generated-digvi_58ba4a30"
version = "1.2.2026072010"
description = "Generated ARC-56 Algorand smart-contract clients for Digvijay-12345/Grant-Go-Hackspiration."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "Digvijay-12345" }]
keywords = ["algorand", "arc56", "avm", "smart-contract", "generated-client", "Digvijay-12345", "Grant-Go-Hackspiration"]
dependencies = [
    "algokit-utils>=4.2.3,<5.0.0",
    "py-algorand-sdk>=2.11.1,<3.0.0",
]

[project.urls]
Homepage = "https://github.com/scholtz/Arc56Registry"
Repository = "https://github.com/scholtz/Arc56Registry"

[tool.hatch.build.targets.wheel]
packages = ["src/arc56_generated_digvi_58ba4a30"]
