[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arc56-generated-aryarahimi1-proof-of-handshake"
version = "1.1.2026071815"
description = "Generated ARC-56 Algorand smart-contract clients for aryarahimi1/proof-of-handshake."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "aryarahimi1" }]
keywords = ["algorand", "arc56", "avm", "smart-contract", "generated-client", "aryarahimi1", "proof-of-handshake"]
dependencies = [
    "algokit-utils>=4.2.3,<5.0.0",
    "py-algorand-sdk>=2.11.1,<3.0.0",
]

[project.urls]
Homepage = "https://github.com/scholtz/Arc56Registry"
Repository = "https://github.com/scholtz/Arc56Registry"

[tool.hatch.build.targets.wheel]
packages = ["src/arc56_generated_aryarahimi1_proof_of_handshake"]
