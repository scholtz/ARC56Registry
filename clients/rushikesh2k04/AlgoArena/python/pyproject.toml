[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arc56-generated-rushikesh2k04-algoarena"
version = "1.1.2026071816"
description = "Generated ARC-56 Algorand smart-contract clients for rushikesh2k04/AlgoArena."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "rushikesh2k04" }]
keywords = ["algorand", "arc56", "avm", "smart-contract", "generated-client", "rushikesh2k04", "AlgoArena"]
dependencies = [
    "algokit-utils>=4.2.3,<5.0.0",
    "py-algorand-sdk>=2.11.1,<3.0.0",
]

[project.urls]
Homepage = "https://github.com/scholtz/Arc56Registry"
Repository = "https://github.com/scholtz/Arc56Registry"

[tool.hatch.build.targets.wheel]
packages = ["src/arc56_generated_rushikesh2k04_algoarena"]
