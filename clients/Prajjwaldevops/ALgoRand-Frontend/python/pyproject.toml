[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arc56-generated-prajj_41cb0b69"
version = "1.2.2026072010"
description = "Generated ARC-56 Algorand smart-contract clients for Prajjwaldevops/ALgoRand-Frontend."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "Prajjwaldevops" }]
keywords = ["algorand", "arc56", "avm", "smart-contract", "generated-client", "Prajjwaldevops", "ALgoRand-Frontend"]
dependencies = [
    "algokit-utils>=4.2.3,<5.0.0",
    "py-algorand-sdk>=2.11.1,<3.0.0",
]

[project.urls]
Homepage = "https://github.com/scholtz/Arc56Registry"
Repository = "https://github.com/scholtz/Arc56Registry"

[tool.hatch.build.targets.wheel]
packages = ["src/arc56_generated_prajj_41cb0b69"]
