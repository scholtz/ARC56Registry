[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arc56-generated-tommasoo0-algorand-prediction-market"
version = "1.1.2026071816"
description = "Generated ARC-56 Algorand smart-contract clients for tommasoo0/algorand-prediction-market."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "tommasoo0" }]
keywords = ["algorand", "arc56", "avm", "smart-contract", "generated-client", "tommasoo0", "algorand-prediction-market"]
dependencies = [
    "algokit-utils>=4.2.3,<5.0.0",
    "py-algorand-sdk>=2.11.1,<3.0.0",
]

[project.urls]
Homepage = "https://github.com/scholtz/Arc56Registry"
Repository = "https://github.com/scholtz/Arc56Registry"

[tool.hatch.build.targets.wheel]
packages = ["src/arc56_generated_tommasoo0_algorand_prediction_market"]
