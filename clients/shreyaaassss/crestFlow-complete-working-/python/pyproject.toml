description = "Generated ARC-56 Algorand smart-contract clients for shreyaaassss/crestFlow-complete-working-."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "shreyaaassss" }]
keywords = ["algorand", "arc56", "avm", "smart-contract", "generated-client", "shreyaaassss", "crestFlow-complete-working-"]
