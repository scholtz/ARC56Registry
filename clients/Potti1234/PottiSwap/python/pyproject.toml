[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arc56-generated-potti1234-pottiswap"
version = "1.1.2026071815"
description = "Generated ARC-56 Algorand smart-contract clients for Potti1234/PottiSwap."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "Potti1234" }]
keywords = ["algorand", "arc56", "avm", "smart-contract", "generated-client", "Potti1234", "PottiSwap"]
dependencies = [
    "algokit-utils>=4.2.3,<5.0.0",
    "py-algorand-sdk>=2.11.1,<3.0.0",
]

[project.urls]
Homepage = "https://github.com/scholtz/Arc56Registry"
Repository = "https://github.com/scholtz/Arc56Registry"

[tool.hatch.build.targets.wheel]
packages = ["src/arc56_generated_potti1234_pottiswap"]
