[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arc56-generated-srizd_1e4d7b78"
version = "1.2.2026072010"
description = "Generated ARC-56 Algorand smart-contract clients for Srizdebnath/AlgoAgentX."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "Srizdebnath" }]
keywords = ["algorand", "arc56", "avm", "smart-contract", "generated-client", "Srizdebnath", "AlgoAgentX"]
dependencies = [
    "algokit-utils>=4.2.3,<5.0.0",
    "py-algorand-sdk>=2.11.1,<3.0.0",
]

[project.urls]
Homepage = "https://github.com/scholtz/Arc56Registry"
Repository = "https://github.com/scholtz/Arc56Registry"

[tool.hatch.build.targets.wheel]
packages = ["src/arc56_generated_srizd_1e4d7b78"]
