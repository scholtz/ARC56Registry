[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arc56-generated-anuragaj25-basecase-web3-algorand"
version = "1.1.2026071814"
description = "Generated ARC-56 Algorand smart-contract clients for AnuragAJ25/BaseCase-Web3-Algorand."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "AnuragAJ25" }]
keywords = ["algorand", "arc56", "avm", "smart-contract", "generated-client", "AnuragAJ25", "BaseCase-Web3-Algorand"]
dependencies = [
    "algokit-utils>=4.0.1,<5.0.0",
    "py-algorand-sdk>=2.0.0",
]

[project.urls]
Homepage = "https://github.com/scholtz/Arc56Registry"
Repository = "https://github.com/scholtz/Arc56Registry"

[tool.hatch.build.targets.wheel]
packages = ["src/arc56_generated_anuragaj25_basecase_web3_algorand"]
