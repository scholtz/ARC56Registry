[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arc56-generated-iamte_14e1d9c1"
version = "1.2.2026072010"
description = "Generated ARC-56 Algorand smart-contract clients for iamterabro/on-chain-voting."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "iamterabro" }]
keywords = ["algorand", "arc56", "avm", "smart-contract", "generated-client", "iamterabro", "on-chain-voting"]
dependencies = [
    "algokit-utils>=4.2.3,<5.0.0",
    "py-algorand-sdk>=2.11.1,<3.0.0",
]

[project.urls]
Homepage = "https://github.com/scholtz/Arc56Registry"
Repository = "https://github.com/scholtz/Arc56Registry"

[tool.hatch.build.targets.wheel]
packages = ["src/arc56_generated_iamte_14e1d9c1"]
