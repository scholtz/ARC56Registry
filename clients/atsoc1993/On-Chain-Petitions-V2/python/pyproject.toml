[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arc56-generated-atsoc1993-on-chain-petitions-v2"
version = "1.1.2026071815"
description = "Generated ARC-56 Algorand smart-contract clients for atsoc1993/On-Chain-Petitions-V2."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "atsoc1993" }]
keywords = ["algorand", "arc56", "avm", "smart-contract", "generated-client", "atsoc1993", "On-Chain-Petitions-V2"]
dependencies = [
    "algokit-utils>=4.2.3,<5.0.0",
    "py-algorand-sdk>=2.11.1,<3.0.0",
]

[project.urls]
Homepage = "https://github.com/scholtz/Arc56Registry"
Repository = "https://github.com/scholtz/Arc56Registry"

[tool.hatch.build.targets.wheel]
packages = ["src/arc56_generated_atsoc1993_on_chain_petitions_v2"]
