[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arc56-generated-atsoc_973cffc7"
version = "1.2.2026072010"
description = "Generated ARC-56 Algorand smart-contract clients for atsoc1993/xGov-Proposals-Contracts."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "atsoc1993" }]
keywords = ["algorand", "arc56", "avm", "smart-contract", "generated-client", "atsoc1993", "xGov-Proposals-Contracts"]
dependencies = [
    "algokit-utils>=4.2.3,<5.0.0",
    "py-algorand-sdk>=2.11.1,<3.0.0",
]

[project.urls]
Homepage = "https://github.com/scholtz/Arc56Registry"
Repository = "https://github.com/scholtz/Arc56Registry"

[tool.hatch.build.targets.wheel]
packages = ["src/arc56_generated_atsoc_973cffc7"]
