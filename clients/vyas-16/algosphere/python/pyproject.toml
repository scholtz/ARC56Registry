[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arc56-generated-vyas-16-algosphere"
version = "1.1.2026071816"
description = "Generated ARC-56 Algorand smart-contract clients for vyas-16/algosphere."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "vyas-16" }]
keywords = ["algorand", "arc56", "avm", "smart-contract", "generated-client", "vyas-16", "algosphere"]
dependencies = [
    "algokit-utils>=4.2.3,<5.0.0",
    "py-algorand-sdk>=2.11.1,<3.0.0",
]

[project.urls]
Homepage = "https://github.com/scholtz/Arc56Registry"
Repository = "https://github.com/scholtz/Arc56Registry"

[tool.hatch.build.targets.wheel]
packages = ["src/arc56_generated_vyas_16_algosphere"]
