[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arc56-generated-mekal_51752b0a"
version = "1.2.2026072010"
description = "Generated ARC-56 Algorand smart-contract clients for MekalaKaveri18/Project-2."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "MekalaKaveri18" }]
keywords = ["algorand", "arc56", "avm", "smart-contract", "generated-client", "MekalaKaveri18", "Project-2"]
dependencies = [
    "algokit-utils>=4.2.3,<5.0.0",
    "py-algorand-sdk>=2.11.1,<3.0.0",
]

[project.urls]
Homepage = "https://github.com/scholtz/Arc56Registry"
Repository = "https://github.com/scholtz/Arc56Registry"

[tool.hatch.build.targets.wheel]
packages = ["src/arc56_generated_mekal_51752b0a"]
