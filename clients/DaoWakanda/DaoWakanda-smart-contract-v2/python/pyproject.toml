[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arc56-generated-daowa_bd314e29"
version = "1.2.2026072010"
description = "Generated ARC-56 Algorand smart-contract clients for DaoWakanda/DaoWakanda-smart-contract-v2."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "DaoWakanda" }]
keywords = ["algorand", "arc56", "avm", "smart-contract", "generated-client", "DaoWakanda", "DaoWakanda-smart-contract-v2"]
dependencies = [
    "algokit-utils>=4.2.3,<5.0.0",
    "py-algorand-sdk>=2.11.1,<3.0.0",
]

[project.urls]
Homepage = "https://github.com/scholtz/Arc56Registry"
Repository = "https://github.com/scholtz/Arc56Registry"

[tool.hatch.build.targets.wheel]
packages = ["src/arc56_generated_daowa_bd314e29"]
