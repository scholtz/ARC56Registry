[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arc56-generated-prasanna-kuracha-fractalvault"
version = "1.1.2026071816"
description = "Generated ARC-56 Algorand smart-contract clients for prasanna-kuracha/FractalVault."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "prasanna-kuracha" }]
keywords = ["algorand", "arc56", "avm", "smart-contract", "generated-client", "prasanna-kuracha", "FractalVault"]
dependencies = [
    "algokit-utils>=4.2.3,<5.0.0",
    "py-algorand-sdk>=2.11.1,<3.0.0",
]

[project.urls]
Homepage = "https://github.com/scholtz/Arc56Registry"
Repository = "https://github.com/scholtz/Arc56Registry"

[tool.hatch.build.targets.wheel]
packages = ["src/arc56_generated_prasanna_kuracha_fractalvault"]
