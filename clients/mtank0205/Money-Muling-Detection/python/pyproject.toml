[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arc56-generated-mtank0205-money-muling-detection"
version = "1.1.2026071816"
description = "Generated ARC-56 Algorand smart-contract clients for mtank0205/Money-Muling-Detection."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "mtank0205" }]
keywords = ["algorand", "arc56", "avm", "smart-contract", "generated-client", "mtank0205", "Money-Muling-Detection"]
dependencies = [
    "algokit-utils>=4.2.3,<5.0.0",
    "py-algorand-sdk>=2.11.1,<3.0.0",
]

[project.urls]
Homepage = "https://github.com/scholtz/Arc56Registry"
Repository = "https://github.com/scholtz/Arc56Registry"

[tool.hatch.build.targets.wheel]
packages = ["src/arc56_generated_mtank0205_money_muling_detection"]
