[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arc56-generated-tasos_f9d8e5bb"
version = "1.2.2026072010"
description = "Generated ARC-56 Algorand smart-contract clients for tasosbit/algokit-repro-genclient-noreturntypes."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "tasosbit" }]
keywords = ["algorand", "arc56", "avm", "smart-contract", "generated-client", "tasosbit", "algokit-repro-genclient-noreturntypes"]
dependencies = [
    "algokit-utils>=4.2.3,<5.0.0",
    "py-algorand-sdk>=2.11.1,<3.0.0",
]

[project.urls]
Homepage = "https://github.com/scholtz/Arc56Registry"
Repository = "https://github.com/scholtz/Arc56Registry"

[tool.hatch.build.targets.wheel]
packages = ["src/arc56_generated_tasos_f9d8e5bb"]
