[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arc56-generated-nikhil-r0-checklist"
version = "1.1.2026071816"
description = "Generated ARC-56 Algorand smart-contract clients for nikhil-r0/checklist."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "nikhil-r0" }]
keywords = ["algorand", "arc56", "avm", "smart-contract", "generated-client", "nikhil-r0", "checklist"]
dependencies = [
    "algokit-utils>=4.2.3,<5.0.0",
    "py-algorand-sdk>=2.11.1,<3.0.0",
]

[project.urls]
Homepage = "https://github.com/scholtz/Arc56Registry"
Repository = "https://github.com/scholtz/Arc56Registry"

[tool.hatch.build.targets.wheel]
packages = ["src/arc56_generated_nikhil_r0_checklist"]
