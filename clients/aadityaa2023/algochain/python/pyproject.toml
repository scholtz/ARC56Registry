[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arc56-generated-aadit_aad3d28c"
version = "1.2.2026072010"
description = "Generated ARC-56 Algorand smart-contract clients for aadityaa2023/algochain."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "aadityaa2023" }]
keywords = ["algorand", "arc56", "avm", "smart-contract", "generated-client", "aadityaa2023", "algochain"]
dependencies = [
    "algokit-utils>=4.2.3,<5.0.0",
    "py-algorand-sdk>=2.11.1,<3.0.0",
]

[project.urls]
Homepage = "https://github.com/scholtz/Arc56Registry"
Repository = "https://github.com/scholtz/Arc56Registry"

[tool.hatch.build.targets.wheel]
packages = ["src/arc56_generated_aadit_aad3d28c"]
