[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arc56-generated-mbhat_a547211e"
version = "1.2.2026072010"
description = "Generated ARC-56 Algorand smart-contract clients for MBhatti26/algorand_carbon_wallet."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "MBhatti26" }]
keywords = ["algorand", "arc56", "avm", "smart-contract", "generated-client", "MBhatti26", "algorand_carbon_wallet"]
dependencies = [
    "algokit-utils>=4.2.3,<5.0.0",
    "py-algorand-sdk>=2.11.1,<3.0.0",
]

[project.urls]
Homepage = "https://github.com/scholtz/Arc56Registry"
Repository = "https://github.com/scholtz/Arc56Registry"

[tool.hatch.build.targets.wheel]
packages = ["src/arc56_generated_mbhat_a547211e"]
