[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arc56-generated-lathi-aayush-pay-per-usage-ai-api-access-system-using-algorand"
version = "1.1.2026071816"
description = "Generated ARC-56 Algorand smart-contract clients for lathi-aayush/pay-per-usage-ai-api-access-system-using-algorand."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "lathi-aayush" }]
keywords = ["algorand", "arc56", "avm", "smart-contract", "generated-client", "lathi-aayush", "pay-per-usage-ai-api-access-system-using-algorand"]
dependencies = [
    "algokit-utils>=4.2.3,<5.0.0",
    "py-algorand-sdk>=2.11.1,<3.0.0",
]

[project.urls]
Homepage = "https://github.com/scholtz/Arc56Registry"
Repository = "https://github.com/scholtz/Arc56Registry"

[tool.hatch.build.targets.wheel]
packages = ["src/arc56_generated_lathi_aayush_pay_per_usage_ai_api_access_system_using_algorand"]
