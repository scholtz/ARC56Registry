[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arc56-generated-hanum_e12df7b7"
version = "1.2.2026072010"
description = "Generated ARC-56 Algorand smart-contract clients for hanumagoudabanakar5-hash/pillproof."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "hanumagoudabanakar5-hash" }]
keywords = ["algorand", "arc56", "avm", "smart-contract", "generated-client", "hanumagoudabanakar5-hash", "pillproof"]
dependencies = [
    "algokit-utils>=4.2.3,<5.0.0",
    "py-algorand-sdk>=2.11.1,<3.0.0",
]

[project.urls]
Homepage = "https://github.com/scholtz/Arc56Registry"
Repository = "https://github.com/scholtz/Arc56Registry"

[tool.hatch.build.targets.wheel]
packages = ["src/arc56_generated_hanum_e12df7b7"]
