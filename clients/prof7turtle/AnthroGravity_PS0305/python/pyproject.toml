[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arc56-generated-prof7turtle-anthrogravity-ps0305"
version = "1.1.2026071816"
description = "Generated ARC-56 Algorand smart-contract clients for prof7turtle/AnthroGravity_PS0305."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "prof7turtle" }]
keywords = ["algorand", "arc56", "avm", "smart-contract", "generated-client", "prof7turtle", "AnthroGravity_PS0305"]
dependencies = [
    "algokit-utils>=4.2.3,<5.0.0",
    "py-algorand-sdk>=2.11.1,<3.0.0",
]

[project.urls]
Homepage = "https://github.com/scholtz/Arc56Registry"
Repository = "https://github.com/scholtz/Arc56Registry"

[tool.hatch.build.targets.wheel]
packages = ["src/arc56_generated_prof7turtle_anthrogravity_ps0305"]
