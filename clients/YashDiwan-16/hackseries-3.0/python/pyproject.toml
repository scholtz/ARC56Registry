[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arc56-generated-yashdiwan-16-hackseries-3-0"
version = "1.1.2026071815"
description = "Generated ARC-56 Algorand smart-contract clients for YashDiwan-16/hackseries-3.0."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "YashDiwan-16" }]
keywords = ["algorand", "arc56", "avm", "smart-contract", "generated-client", "YashDiwan-16", "hackseries-3.0"]
dependencies = [
    "algokit-utils>=4.2.3,<5.0.0",
    "py-algorand-sdk>=2.11.1,<3.0.0",
]

[project.urls]
Homepage = "https://github.com/scholtz/Arc56Registry"
Repository = "https://github.com/scholtz/Arc56Registry"

[tool.hatch.build.targets.wheel]
packages = ["src/arc56_generated_yashdiwan_16_hackseries_3_0"]
