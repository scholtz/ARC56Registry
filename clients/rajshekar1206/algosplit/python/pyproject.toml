[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arc56-generated-rajshekar1206-algosplit"
version = "1.1.2026071816"
description = "Generated ARC-56 Algorand smart-contract clients for rajshekar1206/algosplit."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "rajshekar1206" }]
keywords = ["algorand", "arc56", "avm", "smart-contract", "generated-client", "rajshekar1206", "algosplit"]
dependencies = [
    "algokit-utils>=4.2.3,<5.0.0",
    "py-algorand-sdk>=2.11.1,<3.0.0",
]

[project.urls]
Homepage = "https://github.com/scholtz/Arc56Registry"
Repository = "https://github.com/scholtz/Arc56Registry"

[tool.hatch.build.targets.wheel]
packages = ["src/arc56_generated_rajshekar1206_algosplit"]
