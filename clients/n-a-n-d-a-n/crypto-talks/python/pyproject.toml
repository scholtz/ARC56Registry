[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arc56-generated-n-a-n_d5b9b850"
version = "1.2.2026072010"
description = "Generated ARC-56 Algorand smart-contract clients for n-a-n-d-a-n/crypto-talks."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "n-a-n-d-a-n" }]
keywords = ["algorand", "arc56", "avm", "smart-contract", "generated-client", "n-a-n-d-a-n", "crypto-talks"]
dependencies = [
    "algokit-utils>=4.2.3,<5.0.0",
    "py-algorand-sdk>=2.11.1,<3.0.0",
]

[project.urls]
Homepage = "https://github.com/scholtz/Arc56Registry"
Repository = "https://github.com/scholtz/Arc56Registry"

[tool.hatch.build.targets.wheel]
packages = ["src/arc56_generated_n_a_n_d5b9b850"]
