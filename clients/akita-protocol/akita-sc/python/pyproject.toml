[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arc56-generated-akita_5cada353"
version = "1.4.2026072309"
description = "Generated ARC-56 Algorand smart-contract clients for akita-protocol/akita-sc."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "akita-protocol" }]
keywords = ["algorand", "arc56", "avm", "smart-contract", "generated-client", "akita-protocol", "akita-sc"]
dependencies = [
    "algokit-utils>=4.2.3,<5.0.0",
    "py-algorand-sdk>=2.11.1,<3.0.0",
]

[project.urls]
Homepage = "https://github.com/scholtz/Arc56Registry"
Repository = "https://github.com/scholtz/Arc56Registry"

[tool.hatch.build.targets.wheel]
packages = ["src/arc56_generated_akita_5cada353"]
