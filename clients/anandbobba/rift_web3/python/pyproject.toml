[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arc56-generated-anandbobba-rift-web3"
version = "1.1.2026071815"
description = "Generated ARC-56 Algorand smart-contract clients for anandbobba/rift_web3."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "anandbobba" }]
keywords = ["algorand", "arc56", "avm", "smart-contract", "generated-client", "anandbobba", "rift_web3"]
dependencies = [
    "algokit-utils>=4.2.3,<5.0.0",
    "py-algorand-sdk>=2.11.1,<3.0.0",
]

[project.urls]
Homepage = "https://github.com/scholtz/Arc56Registry"
Repository = "https://github.com/scholtz/Arc56Registry"

[tool.hatch.build.targets.wheel]
packages = ["src/arc56_generated_anandbobba_rift_web3"]
