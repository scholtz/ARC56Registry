[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arc56-generated-joe-p-mithras-protocol"
version = "1.1.2026071816"
description = "Generated ARC-56 Algorand smart-contract clients for joe-p/Mithras-Protocol."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "joe-p" }]
keywords = ["algorand", "arc56", "avm", "smart-contract", "generated-client", "joe-p", "Mithras-Protocol"]
dependencies = [
    "algokit-utils>=4.2.3,<5.0.0",
    "py-algorand-sdk>=2.11.1,<3.0.0",
]

[project.urls]
Homepage = "https://github.com/scholtz/Arc56Registry"
Repository = "https://github.com/scholtz/Arc56Registry"

[tool.hatch.build.targets.wheel]
packages = ["src/arc56_generated_joe_p_mithras_protocol"]
